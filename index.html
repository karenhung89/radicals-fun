        // --- REACT COMPONENTS ---

        // Writing Modal
        const WritingModal = ({ char, isOpen, onClose }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                if (isOpen && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    
                    const rect = canvas.getBoundingClientRect();
                    canvas.width = rect.width;
                    canvas.height = rect.height;
                    
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = '#2d3436';
                    ctx.lineWidth = 8;
                    
                    drawGrid(ctx, canvas.width, canvas.height);
                }
            }, [isOpen]);

            const drawGrid = (ctx, w, h) => {
                ctx.save();
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                
                ctx.beginPath();
                ctx.moveTo(0, 0); ctx.lineTo(w, h);
                ctx.moveTo(w, 0); ctx.lineTo(0, h);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
                ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
                ctx.stroke();
                
                ctx.setLineDash([]);
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#FF8E72';
                ctx.strokeRect(0, 0, w, h);
                
                ctx.restore();
            };

            const getCoordinates = (event) => {
                const canvas = canvasRef.current;
                if (!canvas) return { x: 0, y: 0 };
                const rect = canvas.getBoundingClientRect();
                let clientX, clientY;
                if (event.touches && event.touches[0]) {
                    clientX = event.touches[0].clientX;
                    clientY = event.touches[0].clientY;
                } else {
                    clientX = event.clientX;
                    clientY = event.clientY;
                }
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const startDrawing = (e) => {
                if (e.type === 'touchstart') e.preventDefault();
                const { x, y } = getCoordinates(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath();
                ctx.moveTo(x, y);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (e.type === 'touchmove') e.preventDefault();
                if (!isDrawing) return;
                const { x, y } = getCoordinates(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const stopDrawing = () => {
                if (canvasRef.current) {
                    const ctx = canvasRef.current.getContext('2d');
                    ctx.closePath();
                }
                setIsDrawing(false);
            };

            const clearCanvas = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawGrid(ctx, canvas.width, canvas.height);
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fadeIn" onClick={onClose}>
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 relative" onClick={(e) => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute -top-3 -right-3 z-50 p-3 bg-red-100 rounded-full text-red-500 shadow-md hover:bg-red-500 hover:text-white transition-all transform hover:scale-110">
                            <Icons.X size={24} strokeWidth={3} />
                        </button>
                        <h3 className="text-2xl font-bold text-center mb-2 text-gray-700">Practice Writing</h3>
                        <p className="text-center text-gray-400 mb-6">Trace: <span className="text-orange-500 font-kaiti text-2xl mx-1">{char}</span></p>
                        <div className="relative aspect-square w-full bg-orange-50/30 rounded-xl overflow-hidden cursor-crosshair touch-none select-none">
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none select-none">
                                <span className="font-kaiti text-[200px] text-gray-200 opacity-50 select-none">{char}</span>
                            </div>
                            <canvas ref={canvasRef} className="w-full h-full relative z-10 touch-none" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                        </div>
                        <div className="flex justify-center mt-6">
                            <button onClick={clearCanvas} className="flex items-center gap-2 px-6 py-2 bg-orange-100 text-orange-600 rounded-full font-bold hover:bg-orange-200 transition-colors">
                                <Icons.Eraser size={20} /> Clear Board
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const RadicalCard = ({ data, onSpeak, onOpenPractice }) => {
            const [isFlipped, setIsFlipped] = useState(false);

            return (
                <div className="group perspective h-72 w-full cursor-pointer relative">
                    <div className={`relative h-full w-full transition-all duration-500 preserve-3d ${isFlipped ? 'rotate-y-180' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                        
                        {/* Front */}
                        <div className="absolute inset-0 backface-hidden bg-white rounded-2xl shadow-lg border-2 border-orange-100 hover:border-orange-300 p-4 flex flex-col items-center justify-between overflow-hidden">
                            <div className="absolute top-0 right-0 p-2 opacity-50">
                                <Icons.RotateCw size={16} className="text-gray-400" />
                            </div>
                            <div className="flex-1 flex flex-row items-center justify-center w-full gap-4 md:gap-8 px-2">
                                <div className="text-7xl font-kaiti text-orange-500 font-bold drop-shadow-sm leading-none">{data.char}</div>
                                <div className="w-0.5 h-16 bg-orange-100 rounded-full"></div>
                                <div className="animate-bounce-slow">
                                    <div className="text-6xl md:text-7xl leading-none filter drop-shadow-sm transform transition-transform duration-300 group-hover:scale-110">{data.img}</div>
                                </div>
                            </div>
                            <div className="w-full bg-orange-50 rounded-xl p-3 text-center mt-2 flex flex-col items-center">
                                <h3 className="text-lg font-bold text-gray-800">{data.name}</h3>
                                <div className="flex items-center justify-center gap-2 mt-1 w-full relative">
                                    <span className="text-teal-600 font-medium">{data.pinyin}</span>
                                    <button onClick={(e) => { e.stopPropagation(); onSpeak(data.char + " " + data.name); }} className="p-1.5 rounded-full hover:bg-teal-100 text-teal-500 transition-colors">
                                        <Icons.Volume2 size={16} />
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Back */}
                        <div className="absolute inset-0 backface-hidden rotate-y-180 bg-gradient-to-br from-orange-50 to-white rounded-2xl shadow-lg border-2 border-orange-200 p-5 flex flex-col items-center justify-center">
                            <div className="absolute top-2 right-2 flex gap-2">
                                <button onClick={(e) => { e.stopPropagation(); onOpenPractice(data.char); }} className="flex items-center gap-1 bg-white border border-orange-200 text-orange-500 px-3 py-1 rounded-full text-xs font-bold hover:bg-orange-500 hover:text-white transition-colors shadow-sm">
                                    <Icons.PenTool size={12} /> 写
                                </button>
                            </div>
                            <h4 className="text-xl font-bold text-orange-600 mb-1 mt-4">{data.meaning}</h4>
                            <p className="text-gray-500 text-sm mb-4">Meaning</p>
                            <div className="w-full bg-white rounded-xl p-3 shadow-inner">
                                <p className="text-xs text-gray-400 font-bold uppercase tracking-wider mb-2">Examples</p>
                                <div className="space-y-2">
                                    {data.examples.map((ex, idx) => (
                                        <div key={idx} className="flex items-center gap-2 border-b border-gray-100 last:border-0 pb-1 last:pb-0">
                                            <span className="w-2 h-2 rounded-full bg-teal-400"></span>
                                            <span className="font-kaiti text-lg text-gray-700">{ex.split(' ')[0]}</span>
                                            <span className="text-xs text-gray-500">{ex.split(' ')[1]}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <p className="text-xs text-center text-gray-400 mt-4">(Click to flip back)</p>
                        </div>
                    </div>
                </div>
            );
        };

        const ChapterGroup = ({ title, radicals, onSpeak, onOpenPractice, isOpen, onToggle }) => {
            return (
                <div className="bg-white/60 rounded-3xl overflow-hidden shadow-sm border border-white/60 backdrop-blur-sm transition-all duration-300 mb-6">
                    <button onClick={onToggle} className="w-full flex items-center justify-between p-5 hover:bg-white/50 transition-colors cursor-pointer text-left focus:outline-none">
                        <h2 className="text-xl font-bold text-indigo-800 flex items-center gap-3">
                            <span className="bg-indigo-100 text-indigo-600 p-2 rounded-lg text-sm shadow-sm">{title.includes("Search") ? "🔍" : "📖 Chapter"}</span>
                            {title}
                        </h2>
                        <div className={`p-2 rounded-full bg-indigo-50 text-indigo-400 transition-all duration-300 ${isOpen ? 'rotate-180 bg-indigo-100 text-indigo-600' : ''}`}>
                            <Icons.ChevronDown size={20} />
                        </div>
                    </button>
                    <div className={`transition-all duration-500 ease-in-out overflow-hidden ${isOpen ? 'max-h-[3000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="p-6 pt-0 border-t border-indigo-50/50">
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-6">
                                {radicals.map((radical, idx) => (
                                    <RadicalCard key={idx} data={radical} onSpeak={onSpeak} onOpenPractice={onOpenPractice} />
                                ))}
                            </div>
                            {radicals.length === 0 && <div className="text-center text-gray-400 py-10">No radicals found matching your search.</div>}
                        </div>
                    </div>
                </div>
            );
        };

        const QuizMode = ({ allRadicals }) => {
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState(null);

            const generateQuestion = () => {
                const randomRadical = allRadicals[Math.floor(Math.random() * allRadicals.length)];
                const options = [randomRadical];
                while (options.length < 4) {
                    const r = allRadicals[Math.floor(Math.random() * allRadicals.length)];
                    if (!options.find(o => o.char === r.char)) options.push(r);
                }
                setCurrentQuestion({ target: randomRadical, options: options.sort(() => Math.random() - 0.5) });
                setFeedback(null);
            };

            useEffect(() => { generateQuestion(); }, []);

            const handleAnswer = (selected) => {
                if (selected.char === currentQuestion.target.char) {
                    setScore(score + 10);
                    setFeedback("correct");
                    setTimeout(generateQuestion, 1500);
                } else {
                    setFeedback("wrong");
                }
            };

            if (!currentQuestion) return <div className="p-8 text-center text-gray-500">Loading Quiz...</div>;

            return (
                <div className="max-w-2xl mx-auto p-8 bg-white/80 backdrop-blur rounded-3xl shadow-xl mt-8 border border-white">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-2"><Icons.Brain className="text-purple-500" /> Radical Challenge!</h2>
                        <div className="bg-yellow-100 px-4 py-2 rounded-full flex items-center gap-2 text-yellow-700 font-bold shadow-sm"><Icons.Trophy size={20} /> {score} pts</div>
                    </div>
                    <div className="text-center mb-10 p-6 bg-indigo-50 rounded-2xl">
                        <p className="text-gray-500 mb-3 uppercase tracking-wide text-sm font-bold">Which radical means...</p>
                        <div className="text-4xl font-bold text-indigo-600 animate-pulse flex items-center justify-center gap-3">
                            <span>{currentQuestion.target.meaning}</span><span>{currentQuestion.target.img}</span>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {currentQuestion.options.map((opt, idx) => (
                            <button key={idx} onClick={() => handleAnswer(opt)} disabled={feedback === "correct"} className={`p-6 rounded-2xl text-5xl font-kaiti transition-all transform hover:scale-105 active:scale-95 shadow-sm ${feedback === "correct" && opt.char === currentQuestion.target.char ? "bg-green-100 border-2 border-green-500 text-green-700 shadow-green-200" : feedback === "wrong" ? "bg-gray-50 border-2 border-gray-200 hover:border-purple-300 opacity-50" : "bg-white border-2 border-gray-100 hover:border-purple-400 hover:shadow-lg hover:bg-purple-50"}`}>
                                {opt.char}
                            </button>
                        ))}
                    </div>
                    {feedback && <div className={`mt-6 text-center font-bold text-xl animate-bounce ${feedback === "correct" ? "text-green-500" : "text-red-500"}`}>{feedback === "correct" ? "🎉 Great Job! Next question..." : "Try again! 💪"}</div>}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState("1A");
            const [searchQuery, setSearchQuery] = useState("");
            const [expandedChapters, setExpandedChapters] = useState({});
            const [practiceChar, setPracticeChar] = useState(null);

            useEffect(() => {
                if (activeTab !== "QUIZ") {
                    const chapters = Object.keys(SYLLABUS_DATA[activeTab] || {});
                    if (chapters.length > 0) setExpandedChapters({ [chapters[0]]: true });
                }
            }, [activeTab]);

            const toggleChapter = (key) => setExpandedChapters(prev => ({ ...prev, [key]: !prev[key] }));
            const toggleAll = (open) => {
                const chapters = Object.keys(SYLLABUS_DATA[activeTab] || {});
                const next = {};
                chapters.forEach(c => next[c] = open);
                setExpandedChapters(next);
            };

            const getAllRadicals = () => {
                let all = [];
                Object.values(SYLLABUS_DATA).forEach(b => Object.values(b).forEach(l => all = [...all, ...l]));
                return all;
            };

            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'zh-CN'; u.rate = 0.8;
                    const v = window.speechSynthesis.getVoices().find(v => v.lang.includes('zh'));
                    if (v) u.voice = v;
                    window.speechSynthesis.speak(u);
                }
            };

            const renderContent = () => {
                if (activeTab === "QUIZ") return <QuizMode allRadicals={getAllRadicals()} />;
                let display = {}, isSearch = !!searchQuery;
                if (isSearch) {
                    const filtered = getAllRadicals().filter(i => i.name.includes(searchQuery) || i.char.includes(searchQuery) || i.pinyin.includes(searchQuery) || i.meaning.toLowerCase().includes(searchQuery.toLowerCase()));
                    display = { "Search Results": filtered };
                } else {
                    display = SYLLABUS_DATA[activeTab];
                }
                
                return (
                    <div className="space-y-2 animate-fadeIn pb-12">
                        {!isSearch && (
                            <div className="flex justify-end gap-2 mb-4 px-2">
                                <button onClick={() => toggleAll(true)} className="text-xs font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors"><Icons.Maximize2 size={12} /> Expand All</button>
                                <button onClick={() => toggleAll(false)} className="text-xs font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors"><Icons.Minimize2 size={12} /> Collapse All</button>
                            </div>
                        )}
                        {Object.entries(display).map(([sec, rads]) => (
                            <ChapterGroup key={sec} title={sec} radicals={rads} onSpeak={speak} onOpenPractice={setPracticeChar} isOpen={isSearch ? true : !!expandedChapters[sec]} onToggle={() => toggleChapter(sec)} />
                        ))}
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-[#F0F4F8] font-sans selection:bg-purple-100">
                    <WritingModal char={practiceChar} isOpen={!!practiceChar} onClose={() => setPracticeChar(null)} />
                    
                    <header className="bg-gradient-to-r from-[#6c5ce7] to-[#4ECDC4] text-white pb-20 pt-8 px-4 relative overflow-hidden shadow-lg">
                        <div className="max-w-6xl mx-auto text-center relative z-10">
                            <h1 className="text-4xl md:text-5xl font-bold mb-2 tracking-tight drop-shadow-md">🌟 汉字部首乐园</h1>
                            <p className="text-xl md:text-2xl text-white/90 font-light drop-shadow-sm">Chinese Radicals Fun Park</p>
                            <div className="mt-8 flex justify-center">
                                <div className="bg-white/20 p-1.5 rounded-full flex backdrop-blur-md border border-white/20 shadow-xl">
                                    <button onClick={() => setActiveTab("QUIZ")} className={`px-8 py-2.5 rounded-full font-bold transition-all flex items-center gap-2 ${activeTab === "QUIZ" ? "bg-white text-purple-600 shadow-lg scale-105" : "text-white hover:bg-white/10"}`}><Icons.Trophy size={18} /> Challenge Mode</button>
                                    <button onClick={() => setActiveTab("1A")} className={`px-8 py-2.5 rounded-full font-bold transition-all flex items-center gap-2 ${activeTab !== "QUIZ" ? "bg-white text-teal-600 shadow-lg scale-105" : "text-white hover:bg-white/10"}`}><Icons.BookOpen size={18} /> Study Mode</button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto -mt-8 px-4 relative z-20">
                        {activeTab !== "QUIZ" && (
                            <div className="bg-white rounded-2xl p-4 shadow-xl mb-8 flex flex-col md:flex-row items-center justify-between gap-4 border border-gray-100">
                                <div className="flex gap-2 overflow-x-auto w-full md:w-auto pb-2 md:pb-0 hide-scrollbar px-1">
                                    {["1A", "1B", "2A", "2B"].map(book => (
                                        <button key={book} onClick={() => { setActiveTab(book); setSearchQuery(""); }} className={`px-6 py-2.5 rounded-xl font-bold transition-all whitespace-nowrap border-2 ${activeTab === book ? "bg-purple-50 text-purple-600 border-purple-200 shadow-sm transform scale-105" : "bg-transparent text-gray-500 border-transparent hover:bg-gray-50"}`}>Book {book}</button>
                                    ))}
                                </div>
                                <div className="relative w-full md:w-80 group">
                                    <Icons.Search className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 group-focus-within:text-teal-500 transition-colors" size={20} />
                                    <input type="text" placeholder="Search (e.g. water, 氵, river)..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-gray-50 border-2 border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-teal-100 focus:border-teal-400 focus:bg-white transition-all shadow-inner" />
                                </div>
                            </div>
                        )}
                        {renderContent()}
                    </main>

                    <footer className="bg-white border-t border-gray-200 py-10 text-center text-gray-500 text-sm mt-auto">
                        <p className="font-medium text-gray-600">Curated for Singapore Primary 1 & 2 • Based on Huanle Huoban Curriculum</p>
                        <p className="mt-2 text-xs text-gray-400 flex items-center justify-center gap-1"><Icons.RotateCw size={12} /> Click cards to flip • <Icons.PenTool size={12} /> to Practice</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
