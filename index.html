<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+XiaoWei&display=swap');
        
        body { 
            background-color: #F0F4F8; 
            font-family: 'Noto Sans SC', sans-serif; 
            overflow-x: hidden; 
        }
        .font-kaiti { font-family: 'ZCOOL XiaoWei', 'KaiTi', serif; }
        
        /* 3D Flip Card Utilities */
        .perspective { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        /* Animations */
        @keyframes bounce-slow { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-8px); } 
        }
        .animate-bounce-slow { animation: bounce-slow 3s infinite ease-in-out; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        /* Custom Scrollbar hide */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Accordion transition */
        .accordion-content {
            transition: max-height 0.5s ease-in-out, opacity 0.5s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.expanded {
            max-height: 3000px;
            opacity: 1;
        }
        .chevron { transition: transform 0.3s ease; }
        .chevron.rotated { transform: rotate(180deg); }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-purple-100">

            Trophy: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`
        };

        // --- STATE ---
        let currentMode = "STUDY"; // "STUDY" or "QUIZ"
        let activeTab = "1A";
        let searchQuery = "";
        let expandedChapters = {};
        
        // Quiz State
        let quizScore = 0;
        let currentQuestion = null;
        let allRadicals = [];
        
        // Canvas State
        let canvas = null;
        let ctx = null;
        let isDrawing = false;

        // --- INIT & UTILS ---
        function init() {
            // Flatten radicals for search and quiz
            Object.values(SYLLABUS_DATA).forEach(b => {
                Object.values(b).forEach(l => {
                    allRadicals = [...allRadicals, ...l];
                });
            });

            // Initialize Canvas
            canvas = document.getElementById('writingCanvas');
            ctx = canvas.getContext('2d');
            setupCanvasEvents();

            // Set initial state
            setTab(activeTab);
        }

        function getAllRadicals() { return allRadicals; }

        function escapeHtml(unsafe) {
            return (unsafe || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // --- SPEECH LOGIC (FIXED) ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'zh-CN'; 
                u.rate = 0.8;
                
                const voices = window.speechSynthesis.getVoices();
                
                // 1. Strict Mandarin
                let selectedVoice = voices.find(v => v.lang === 'zh-CN' || v.lang === 'zh_CN');
                
                // 2. Fallback (avoid HK/Yue)
                if (!selectedVoice) {
                    selectedVoice = voices.find(v => 
                        v.lang.startsWith('zh') && 
                        !v.lang.toLowerCase().includes('hk') && 
                        !v.lang.toLowerCase().includes('yue')
                    );
                }

                if (selectedVoice) u.voice = selectedVoice;
                window.speechSynthesis.speak(u);
            }
        }

        // --- NAVIGATION & TABS ---
        function setMode(mode) {
            currentMode = mode;
            
            const btnStudy = document.getElementById('btnStudy');
            const btnChallenge = document.getElementById('btnChallenge');
            const studyControls = document.getElementById('studyControls');

            if (mode === 'QUIZ') {
                btnChallenge.className = "px-8 py-2.5 rounded-full font-bold transition-all flex items-center gap-2 bg-white text-purple-600 shadow-lg scale-105";
                btnStudy.className = "px-8 py-2.5 rounded-full font-bold transition-all flex items-center gap-2 text-white hover:bg-white/10";
                studyControls.classList.add('hidden');
                quizScore = 0;
                generateQuizQuestion();
            } else {
                btnStudy.className = "px-8 py-2.5 rounded-full font-bold transition-all flex items-center gap-2 bg-white text-teal-600 shadow-lg scale-105";
                btnChallenge.className = "px-8 py-2.5 rounded-full font-bold transition-all flex items-center gap-2 text-white hover:bg-white/10";
                studyControls.classList.remove('hidden');
                document.getElementById('searchInput').value = "";
                searchQuery = "";
                setTab(activeTab);
            }
        }

        function setTab(tabName) {
            activeTab = tabName;
            
            // Render Tabs
            const books = ["1A", "1B", "2A", "2B"];
            const tabHTML = books.map(book => `
                <button onclick="setTab('${book}')" class="px-6 py-2.5 rounded-xl font-bold transition-all whitespace-nowrap border-2 ${activeTab === book ? "bg-purple-50 text-purple-600 border-purple-200 shadow-sm transform scale-105" : "bg-transparent text-gray-500 border-transparent hover:bg-gray-50"}">
                    Book ${book}
                </button>
            `).join('');
            document.getElementById('tabContainer').innerHTML = tabHTML;

            // Reset Expanded State (open first chapter by default)
            expandedChapters = {};
            const chapters = Object.keys(SYLLABUS_DATA[activeTab] || {});
            if (chapters.length > 0) expandedChapters[chapters[0]] = true;

            renderStudyContent();
        }

        // --- SEARCH ---
        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value.trim();
            renderStudyContent();
        }

        // --- RENDER CONTENT ---
        function toggleChapter(chapterId) {
            expandedChapters[chapterId] = !expandedChapters[chapterId];
            
            const content = document.getElementById(`chapter-content-${chapterId}`);
            const chevron = document.getElementById(`chapter-chevron-${chapterId}`);
            const iconBg = document.getElementById(`chapter-icon-${chapterId}`);
            
            if (expandedChapters[chapterId]) {
                content.classList.add('expanded');
                chevron.classList.add('rotated');
                iconBg.classList.add('bg-indigo-100', 'text-indigo-600');
                iconBg.classList.remove('bg-indigo-50', 'text-indigo-400');
            } else {
                content.classList.remove('expanded');
                chevron.classList.remove('rotated');
                iconBg.classList.remove('bg-indigo-100', 'text-indigo-600');
                iconBg.classList.add('bg-indigo-50', 'text-indigo-400');
            }
        }

        function toggleAll(open) {
            const chapters = Object.keys(SYLLABUS_DATA[activeTab] || {});
            chapters.forEach(c => {
                expandedChapters[c] = open;
                // Force UI update
                const content = document.getElementById(`chapter-content-${c}`);
                const chevron = document.getElementById(`chapter-chevron-${c}`);
                const iconBg = document.getElementById(`chapter-icon-${c}`);
                if(content && chevron && iconBg) {
                    if (open) {
                        content.classList.add('expanded');
                        chevron.classList.add('rotated');
                        iconBg.classList.add('bg-indigo-100', 'text-indigo-600');
                        iconBg.classList.remove('bg-indigo-50', 'text-indigo-400');
                    } else {
                        content.classList.remove('expanded');
                        chevron.classList.remove('rotated');
                        iconBg.classList.remove('bg-indigo-100', 'text-indigo-600');
                        iconBg.classList.add('bg-indigo-50', 'text-indigo-400');
                    }
                }
            });
        }

        function flipCard(element) {
            element.querySelector('.card-inner').classList.toggle('rotate-y-180');
        }

        function createRadicalCard(data) {
            const safeChar = escapeHtml(data.char);
            const safeName = escapeHtml(data.name);
            const examplesHtml = data.examples.map(ex => {
                const parts = ex.split(' ');
                const word = escapeHtml(parts[0]);
                const eng = escapeHtml(parts.slice(1).join(' '));
                return `
                    <div class="flex items-center gap-2 border-b border-gray-100 last:border-0 pb-1 last:pb-0">
                        <span class="w-2 h-2 rounded-full bg-teal-400"></span>
                        <span class="font-kaiti text-lg text-gray-700">${word}</span>
                        <span class="text-xs text-gray-500">${eng}</span>
                    </div>`;
            }).join('');

            return `
                <div class="group perspective h-72 w-full cursor-pointer relative" onclick="flipCard(this)">
                    <div class="card-inner relative h-full w-full transition-all duration-500 preserve-3d">
                        
                        <!-- Front -->
                        <div class="absolute inset-0 backface-hidden bg-white rounded-2xl shadow-lg border-2 border-orange-100 hover:border-orange-300 p-4 flex flex-col items-center justify-between overflow-hidden">
                            <div class="absolute top-0 right-0 p-2 opacity-50 text-gray-400">
                                ${ICONS.RotateCw}
                            </div>
                            <div class="flex-1 flex flex-row items-center justify-center w-full gap-4 md:gap-8 px-2">
                                <div class="text-7xl font-kaiti text-orange-500 font-bold drop-shadow-sm leading-none">${safeChar}</div>
                                <div class="w-0.5 h-16 bg-orange-100 rounded-full"></div>
                                <div class="animate-bounce-slow">
                                    <div class="text-6xl md:text-7xl leading-none filter drop-shadow-sm transform transition-transform duration-300 group-hover:scale-110">${data.img}</div>
                                </div>
                            </div>
                            <div class="w-full bg-orange-50 rounded-xl p-3 text-center mt-2 flex flex-col items-center">
                                <h3 class="text-lg font-bold text-gray-800">${safeName}</h3>
                                <div class="flex items-center justify-center gap-2 mt-1 w-full relative">
                                    <span class="text-teal-600 font-medium">${escapeHtml(data.pinyin)}</span>
                                    <button onclick="event.stopPropagation(); speak('${safeChar} ${safeName}')" class="p-1.5 rounded-full hover:bg-teal-100 text-teal-500 transition-colors">
                                        ${ICONS.Volume2}
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Back -->
                        <div class="absolute inset-0 backface-hidden rotate-y-180 bg-gradient-to-br from-orange-50 to-white rounded-2xl shadow-lg border-2 border-orange-200 p-5 flex flex-col items-center justify-center">
                            <div class="absolute top-2 right-2 flex gap-2">
                                <button onclick="event.stopPropagation(); openWritingModal('${safeChar}')" class="flex items-center gap-1 bg-white border border-orange-200 text-orange-500 px-3 py-1 rounded-full text-xs font-bold hover:bg-orange-500 hover:text-white transition-colors shadow-sm">
                                    ${ICONS.PenTool} 写
                                </button>
                            </div>
                            <h4 class="text-xl font-bold text-orange-600 mb-1 mt-4">${escapeHtml(data.meaning)}</h4>
                            <p class="text-gray-500 text-sm mb-4">Meaning</p>
                            <div class="w-full bg-white rounded-xl p-3 shadow-inner">
                                <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-2">Examples</p>
                                <div class="space-y-2">
                                    ${examplesHtml}
                                </div>
                            </div>
                            <p class="text-xs text-center text-gray-400 mt-4">(Click to flip back)</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function createChapterGroup(title, radicals, isSearch = false) {
            const safeTitle = escapeHtml(title);
            const isOpen = isSearch ? true : !!expandedChapters[title];
            const contentClass = isOpen ? 'expanded' : '';
            const chevronClass = isOpen ? 'rotated' : '';
            const iconBgClass = isOpen ? 'bg-indigo-100 text-indigo-600' : 'bg-indigo-50 text-indigo-400';
            
            const cardsHtml = radicals.length > 0 
                ? `<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-6">${radicals.map(r => createRadicalCard(r)).join('')}</div>`
                : `<div class="text-center text-gray-400 py-10">No radicals found matching your search.</div>`;

            const headerIcon = isSearch ? "🔍" : "📖 Chapter";

            return `
                <div class="bg-white/60 rounded-3xl overflow-hidden shadow-sm border border-white/60 backdrop-blur-sm transition-all duration-300 mb-6">
                    <button onclick="toggleChapter('${safeTitle}')" class="w-full flex items-center justify-between p-5 hover:bg-white/50 transition-colors cursor-pointer text-left focus:outline-none">
                        <h2 class="text-xl font-bold text-indigo-800 flex items-center gap-3">
                            <span class="bg-indigo-100 text-indigo-600 p-2 rounded-lg text-sm shadow-sm">${headerIcon}</span>
                            ${safeTitle}
                        </h2>
                        <div id="chapter-icon-${safeTitle}" class="p-2 rounded-full transition-all duration-300 ${iconBgClass}">
                            <div id="chapter-chevron-${safeTitle}" class="chevron ${chevronClass}">${ICONS.ChevronDown}</div>
                        </div>
                    </button>
                    <div id="chapter-content-${safeTitle}" class="accordion-content ${contentClass}">
                        <div class="p-6 pt-0 border-t border-indigo-50/50">
                            ${cardsHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStudyContent() {
            const area = document.getElementById('contentArea');
            let html = "";

            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                const filtered = allRadicals.filter(i => 
                    i.name.toLowerCase().includes(q) || 
                    i.char.includes(q) || 
                    i.pinyin.toLowerCase().includes(q) || 
                    i.meaning.toLowerCase().includes(q)
                );
                html = createChapterGroup("Search Results", filtered, true);
            } else {
                html += `
                    <div class="flex justify-end gap-2 mb-4 px-2">
                        <button onclick="toggleAll(true)" class="text-xs font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors">${ICONS.Maximize} Expand All</button>
                        <button onclick="toggleAll(false)" class="text-xs font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors">${ICONS.Minimize} Collapse All</button>
                    </div>
                `;
                
                const chaptersData = SYLLABUS_DATA[activeTab] || {};
                for (const [sec, rads] of Object.entries(chaptersData)) {
                    html += createChapterGroup(sec, rads, false);
                }
            }
            area.innerHTML = html;
        }

        // --- QUIZ LOGIC ---
        function generateQuizQuestion() {
            const target = allRadicals[Math.floor(Math.random() * allRadicals.length)];
            const options = [target];
            while (options.length < 4) {
                const r = allRadicals[Math.floor(Math.random() * allRadicals.length)];
                if (!options.find(o => o.char === r.char)) options.push(r);
            }
            options.sort(() => Math.random() - 0.5); // Shuffle
            
            currentQuestion = { target, options };
            renderQuizUI(null); // render without feedback
        }

        function handleQuizAnswer(selectedChar) {
            if(!currentQuestion) return;
            
            const isCorrect = selectedChar === currentQuestion.target.char;
            
            if (isCorrect) {
                quizScore += 10;
                renderQuizUI("correct", selectedChar);
                setTimeout(generateQuizQuestion, 1500);
            } else {
                renderQuizUI("wrong", selectedChar);
            }
        }

        function renderQuizUI(feedback, selectedChar) {
            if(!currentQuestion) return;
            const area = document.getElementById('contentArea');
            
            const target = currentQuestion.target;
            
            let feedbackHtml = "";
            if(feedback === "correct") {
                feedbackHtml = `<div class="mt-6 text-center font-bold text-xl animate-bounce text-green-500">🎉 Great Job! Next question...</div>`;
            } else if (feedback === "wrong") {
                feedbackHtml = `<div class="mt-6 text-center font-bold text-xl animate-bounce text-red-500">Try again! 💪</div>`;
            }

            const optionsHtml = currentQuestion.options.map(opt => {
                let btnClass = "bg-white border-2 border-gray-100 hover:border-purple-400 hover:shadow-lg hover:bg-purple-50";
                let disabled = feedback === "correct" ? "disabled" : "";
                
                if (feedback === "correct" && opt.char === target.char) {
                    btnClass = "bg-green-100 border-2 border-green-500 text-green-700 shadow-green-200";
                } else if (feedback === "wrong" && opt.char === selectedChar) {
                    btnClass = "bg-gray-50 border-2 border-gray-200 opacity-50";
                }

                return `
                    <button onclick="handleQuizAnswer('${opt.char}')" ${disabled} class="p-6 rounded-2xl text-5xl font-kaiti transition-all transform hover:scale-105 active:scale-95 shadow-sm ${btnClass}">
                        ${opt.char}
                    </button>
                `;
            }).join('');

            area.innerHTML = `
                <div class="max-w-2xl mx-auto p-8 bg-white/80 backdrop-blur rounded-3xl shadow-xl mt-8 border border-white">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                            <span class="text-purple-500">${ICONS.Brain}</span> Radical Challenge!
                        </h2>
                        <div class="bg-yellow-100 px-4 py-2 rounded-full flex items-center gap-2 text-yellow-700 font-bold shadow-sm">
                            <span class="text-yellow-600">${ICONS.Trophy}</span> ${quizScore} pts
                        </div>
                    </div>
                    <div class="text-center mb-10 p-6 bg-indigo-50 rounded-2xl">
                        <p class="text-gray-500 mb-3 uppercase tracking-wide text-sm font-bold">Which radical means...</p>
                        <div class="text-4xl font-bold text-indigo-600 animate-pulse flex items-center justify-center gap-3">
                            <span>${target.meaning}</span><span>${target.img}</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        ${optionsHtml}
                    </div>
                    ${feedbackHtml}
                </div>
            `;
        }

        // --- CANVAS LOGIC ---
        function openWritingModal(char) {
            document.getElementById('writingModal').classList.remove('hidden');
            document.getElementById('writingModal').classList.add('flex');
            document.getElementById('practiceTarget').innerText = char;
            document.getElementById('practiceBackground').innerText = char;
            
            // Allow modal to render fully before grabbing size
            setTimeout(initCanvasContext, 50);
        }

        function closeWritingModal() {
            document.getElementById('writingModal').classList.add('hidden');
            document.getElementById('writingModal').classList.remove('flex');
        }

        function initCanvasContext() {
            if (!canvas || !ctx) return;
            const rect = canvas.getBoundingClientRect();
            
            // Adjust to display size
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            clearCanvas();
        }

        function drawGrid() {
            const w = canvas.width;
            const h = canvas.height;
            
            ctx.save();
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            
            ctx.beginPath();
            ctx.moveTo(0, 0); ctx.lineTo(w, h);
            ctx.moveTo(w, 0); ctx.lineTo(0, h);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
            ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
            ctx.stroke();
            
            ctx.setLineDash([]);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#FF8E72';
            ctx.strokeRect(0, 0, w, h);
            
            ctx.restore();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
        }

        function getCoordinates(event) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            
            if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            return { 
                x: clientX - rect.left, 
                y: clientY - rect.top 
            };
        }

        function setupCanvasEvents() {
            const startDrawing = (e) => {
                if(e.type === 'touchstart') e.preventDefault();
                isDrawing = true;
                const { x, y } = getCoordinates(e);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#2d3436';
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.moveTo(x, y);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                if(e.type === 'touchmove') e.preventDefault();
                const { x, y } = getCoordinates(e);
                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const stopDrawing = () => {
                if (isDrawing) {
                    ctx.closePath();
                    isDrawing = false;
                }
            };

            // Mouse Events
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseleave', stopDrawing);
            
            // Touch Events
            canvas.addEventListener('touchstart', startDrawing, {passive: false});
            canvas.addEventListener('touchmove', draw, {passive: false});
            canvas.addEventListener('touchend', stopDrawing);
        }

        // Start App
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
